[theme]
primaryColor = "#9bb7d4"          # subtle blue (used for buttons, links)
backgroundColor = "#000000"       # main app background
secondaryBackgroundColor = "#111111"  # sidebar / card backgrounds (we won't use sidebar)
textColor = "#f2f2f2"
font = "sans serif"

[client]
showSidebarNavigation = false

[server]
headless = true

[browser]
gatherUsageStats = false
